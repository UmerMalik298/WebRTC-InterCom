<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Patient Room</title>
  <style>
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 20px;
    }
    h2 { color: #f1f5f9; }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .status-row {
      display: flex;
      align-items: center;
      font-size: 15px;
      color: #94a3b8;
    }
    #log {
      background: #1e293b;
      padding: 16px;
      border-radius: 10px;
      width: 340px;
      font-size: 13px;
      color: #94a3b8;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
    }
    button {
      padding: 10px 28px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled { background: #334155; cursor: not-allowed; }

    #audioUnlockBanner {
      background: #f59e0b;
      color: #000;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      display: none;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>

  <h2>🛏️ Patient Room 1</h2>

  <div class="status-row">
    <span class="dot" id="connDot" style="background:#ef4444"></span>
    <span id="connText">Disconnected</span>
  </div>

  <div class="status-row">
    <span class="dot" id="audioDot" style="background:#64748b"></span>
    <span id="audioText">No audio</span>
  </div>

  <button id="audioUnlockBanner" onclick="unlockAudio()">
    👆 TAP HERE TO ENABLE AUDIO
  </button>

  <div id="log">Waiting to connect...</div>

  <button id="connectBtn" onclick="connectPatient()">Connect as Patient</button>
  <button id="disconnectBtn" onclick="disconnectPatient()" disabled>Disconnect</button>

  <!-- audio element — NO autoplay attribute, we control it manually -->
  <audio id="mainAudio" playsinline></audio>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client@1.15.4/dist/livekit-client.umd.min.js"></script>

  <script>
    const BACKEND = "https://webrtc-intercom-production.up.railway.app";
    // const ROOM_NAME = "room-1";
    // const PATIENT_NAME = "patient-room1";
     // Get room name from URL: patient.html?room=room-1
     const params = new URLSearchParams(window.location.search);
     const ROOM_NAME = params.get("room") || "room-1";
     const PATIENT_NAME = "patient-" + ROOM_NAME;
     
    document.querySelector("h2").textContent = "🛏️ Patient — " + ROOM_NAME;

    let room = null;
    let audioUnlocked = false;
    let pendingTrack = null;

    function log(msg) {
      const box = document.getElementById("log");
      const line = document.createElement("div");
      line.textContent = new Date().toLocaleTimeString() + " — " + msg;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function setConnStatus(connected) {
      document.getElementById("connDot").style.background = connected ? "#22c55e" : "#ef4444";
      document.getElementById("connText").textContent = connected ? "Connected to " + ROOM_NAME : "Disconnected";
      document.getElementById("connectBtn").disabled = connected;
      document.getElementById("disconnectBtn").disabled = !connected;
    }

    function setAudioStatus(active) {
      document.getElementById("audioDot").style.background = active ? "#22c55e" : "#64748b";
      document.getElementById("audioText").textContent = active ? "🔊 Receiving audio..." : "Audio ready";
    }

    async function unlockAudio() {
      const banner = document.getElementById("audioUnlockBanner");
      const audioEl = document.getElementById("mainAudio");

      // Play a silent audio to unlock the audio context
      audioEl.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
      try {
        await audioEl.play();
        audioUnlocked = true;
        banner.style.display = "none";
        log("✅ Audio unlocked!");

        // If a track was waiting, attach it now
        if (pendingTrack) {
          log("Attaching pending audio track...");
          await attachTrack(pendingTrack);
          pendingTrack = null;
        }
      } catch (err) {
        log("❌ Audio unlock failed: " + err.message);
      }
    }

    async function attachTrack(track) {
      const audioEl = document.getElementById("mainAudio");

      // Detach any previous track
      audioEl.srcObject = null;

      // Use MediaStream directly — more reliable than track.attach()
      const stream = new MediaStream([track.mediaStreamTrack]);
      audioEl.srcObject = stream;
      audioEl.volume = 1.0;

      try {
        await audioEl.play();
        log("🔊 Audio playing! Hold PTT on technician side to hear voice.");
        setAudioStatus(true);
      } catch (err) {
        log("⚠️ Play failed: " + err.message + " — tap the yellow button");
        pendingTrack = track;
        document.getElementById("audioUnlockBanner").style.display = "block";
        return;
      }

      track.on("muted", () => {
        log("Technician mic closed");
        setAudioStatus(false);
      });
      track.on("unmuted", () => {
        log("🎙️ Technician is speaking!");
        setAudioStatus(true);
      });
    }

    async function connectPatient() {
      log("Fetching token from backend...");
      try {
        const res = await fetch(`${BACKEND}/api/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            room_name: ROOM_NAME,
            participant_name: PATIENT_NAME,
            is_technician: false
          })
        });

        const data = await res.json();
        log("✅ Token received");

        room = new LivekitClient.Room({
          adaptiveStream: true,
        });

        room.on(LivekitClient.RoomEvent.Connected, () => {
          log("✅ Connected to LiveKit room");
          setConnStatus(true);
          // Show unlock banner immediately
          document.getElementById("audioUnlockBanner").style.display = "block";
          log("👆 Click the yellow button to enable audio!");
        });

        room.on(LivekitClient.RoomEvent.Disconnected, () => {
          log("Disconnected from room");
          setConnStatus(false);
          setAudioStatus(false);
          document.getElementById("audioUnlockBanner").style.display = "none";
          audioUnlocked = false;
        });

        room.on(LivekitClient.RoomEvent.TrackSubscribed, async (track, pub, participant) => {
          if (track.kind !== "audio") return;
          log("🎵 Audio track received from: " + participant.identity);

          if (audioUnlocked) {
            await attachTrack(track);
          } else {
            pendingTrack = track;
            log("👆 Click the yellow button to hear audio!");
            document.getElementById("audioUnlockBanner").style.display = "block";
          }
        });

        room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
          if (track.kind === "audio") {
            document.getElementById("mainAudio").srcObject = null;
            setAudioStatus(false);
            log("Audio track removed");
          }
        });

        await room.connect(data.livekit_url, data.token, { autoSubscribe: true });

      } catch (err) {
        log("❌ Error: " + err.message);
        console.error(err);
      }
    }

    async function disconnectPatient() {
      if (room) {
        await room.disconnect();
        room = null;
        document.getElementById("mainAudio").srcObject = null;
        log("Manually disconnected");
        setConnStatus(false);
        setAudioStatus(false);
        document.getElementById("audioUnlockBanner").style.display = "none";
        audioUnlocked = false;
        pendingTrack = null;
      }
    }
  </script>
</body>
</html>
